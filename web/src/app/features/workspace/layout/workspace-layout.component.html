<main
  class="workspace-layout"
  [class.workspace-layout--rail-collapsed]="railCollapsed()"
  [ngStyle]="workspaceTheme.cssVars()"
>
  <aside class="workspace-layout__rail">
    <app-workspace-nav-sidebar
      variant="rail"
      [title]="workspaceNavTitle()"
      eyebrow="Administración"
      [collapsed]="railCollapsed()"
      (collapsedChange)="onRailCollapsedChange($event)"
    />
  </aside>
  <div class="workspace-layout__body">
    <div class="workspace-layout__mobile-topnav">
      <app-workspace-nav-sidebar variant="topbar" [title]="workspaceNavTitle()" eyebrow="Administración" />
    </div>
    <header class="workspace-layout__top">
      <a class="workspace-layout__public-link" *ngIf="publicBookingPath" [routerLink]="publicBookingPath">
        Ver reserva pública: {{ publicBookingPath }}
      </a>
    </header>
    <div class="workspace-layout__outlet">
      <router-outlet />
    </div>
  </div>
</main>
