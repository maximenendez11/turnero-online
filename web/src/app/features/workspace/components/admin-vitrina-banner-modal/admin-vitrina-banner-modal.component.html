<div class="vdlg" *ngIf="open">
  <div class="vdlg__backdrop" (click)="close()" aria-hidden="true"></div>
  <div class="vdlg__panel" role="dialog" aria-modal="true" aria-labelledby="vdlg-banner-title">
    <div class="vdlg__head">
      <h2 id="vdlg-banner-title" class="vdlg__title">Imagen de cabecera</h2>
      <button type="button" class="vdlg__x" (click)="close()" [disabled]="busy" aria-label="Cerrar">×</button>
    </div>
    <p class="vdlg__lead">
      Elegí una imagen desde tu equipo (JPG, PNG o WebP, hasta 5 MB). Se sube y guarda al pulsar Guardar.
    </p>

    <div class="vdlg__preview">
      <img [src]="previewSrc()" alt="Vista previa del banner" (error)="previewBroken = true" />
    </div>

    <div class="vdlg__body vdlg__body--file">
      <input
        #fileInp
        type="file"
        class="sr-only"
        accept="image/jpeg,image/png,image/webp"
        [disabled]="busy"
        (change)="onFilePicked($event)"
      />
      <button type="button" class="btn btn--secondary vdlg__file-btn" [disabled]="busy" (click)="fileInp.click()">
        Elegir imagen…
      </button>
      <p class="vdlg__hint" *ngIf="pickedFile">
        {{ pickedFile.name }} · {{ pickedFile.size / 1024 | number : '1.0-0' }} KB (máx. 5 MB)
      </p>
      <button *ngIf="pickedFile" type="button" class="btn btn--ghost btn--sm" [disabled]="busy" (click)="clearPickedFile()">
        Quitar archivo
      </button>
    </div>

    <p class="vdlg__warn" *ngIf="bannerUrl.trim() && previewBroken && !pickedFile">
      No pudimos cargar la imagen guardada. Elegí un archivo nuevo para reemplazarla.
    </p>

    <div class="vdlg__foot">
      <button type="button" class="btn btn--ghost" [disabled]="busy" (click)="close()">Cancelar</button>
      <button type="button" class="btn btn--ghost" [disabled]="busy" (click)="useDefaultBanner()">Imagen por defecto</button>
      <button type="button" class="btn btn--primary" [disabled]="busy || !pickedFile" (click)="confirm()">
        {{ busy ? 'Guardando…' : 'Guardar' }}
      </button>
    </div>
  </div>
</div>
