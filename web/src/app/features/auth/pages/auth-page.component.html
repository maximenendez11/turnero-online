<main class="auth-shell">
  <section class="auth-card">
    <h1>{{ data.title }}</h1>
    <p class="auth-lead">{{ data.subtitle }}</p>
    <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

    <div *ngIf="showGoogleSignIn" class="auth-google-block">
      <div #googleBtnHost class="auth-google-host" [class.is-loading]="googleLoading()"></div>
      <p *ngIf="googleLoading()" class="auth-google-hint">Cargando Google…</p>
    </div>

    <p *ngIf="showGoogleSignIn" class="auth-divider" role="separator"><span>o</span></p>

    <form (submit)="$event.preventDefault(); submit()">
      <label>
        <span>Email</span>
        <input
          type="email"
          name="email"
          autocomplete="email"
          placeholder="tu@email.com"
          [(ngModel)]="email"
          [disabled]="loading()"
          required
        />
      </label>
      <label *ngIf="showPassword" class="auth-password-label">
        <span>Contraseña</span>
        <div class="auth-password-field">
          <input
            [type]="passwordVisible() ? 'text' : 'password'"
            name="password"
            [attr.autocomplete]="isRegister ? 'new-password' : 'current-password'"
            placeholder="••••••••"
            [(ngModel)]="password"
            [disabled]="loading()"
            [required]="showPassword"
          />
          <button
            type="button"
            class="auth-password-toggle"
            (click)="togglePasswordVisible()"
            [attr.aria-pressed]="passwordVisible()"
            [attr.aria-label]="passwordVisible() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            [disabled]="loading()"
            tabindex="0"
          >
            <span class="material-symbols-outlined" aria-hidden="true">
              {{ passwordVisible() ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </label>
      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Conectando…' : data.submitLabel }}
      </button>
    </form>

    <p *ngIf="showRecaptchaTerms()" class="auth-recaptcha-terms">
      Este sitio está protegido por reCAPTCHA; aplican la
      <a href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer"
        >Política de privacidad</a
      >
      y los
      <a href="https://policies.google.com/terms" target="_blank" rel="noopener noreferrer"
        >Términos de servicio</a
      >
      de Google.
    </p>

    <nav class="auth-secondary" *ngIf="data.secondaryLabel && data.secondaryHref">
      <a [routerLink]="data.secondaryHref" [queryParams]="intentQueryParams">{{ data.secondaryLabel }}</a>
      <a *ngIf="!isRegister" routerLink="/auth/register" [queryParams]="intentQueryParams">Crear cuenta</a>
      <a
        *ngIf="!isRegister && intent === 'customer'"
        routerLink="/auth/register"
        [queryParams]="{ intent: 'workspace' }"
        >Publicar mi negocio</a
      >
    </nav>
  </section>
</main>
