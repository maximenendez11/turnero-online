<!doctype html>
<html lang="es" class="dark-mode">
  <head>
    <meta charset="utf-8" />
    <title>Proyecto base</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      /* Boot splash para evitar FOUC (flash de estilos) hasta que el theme esté listo. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background: #0b0f14;
        color: rgba(255, 255, 255, 0.82);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #app-splash .wrap {
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 24px;
      }
      #app-splash .spinner {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 4px solid rgba(255, 255, 255, 0.14);
        border-top-color: rgba(255, 255, 255, 0.88);
        animation: appSplashSpin 0.85s linear infinite;
      }
      #app-splash .label {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      @keyframes appSplashSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app-splash" aria-label="Cargando">
      <div class="wrap">
        <div class="spinner" aria-hidden="true"></div>
        <div class="label">Cargando…</div>
      </div>
    </div>
    <app-root></app-root>
  </body>
</html>
